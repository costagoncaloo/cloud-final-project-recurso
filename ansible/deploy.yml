- name: Deploy microservices to EC2
  hosts: app
  become: true

  vars:
    app_dir: /opt/cloud-recurso
    aws_region: eu-west-1
    ecr_region: "{{ aws_region }}"
    ecr_registry: 806758135628.dkr.ecr.eu-west-1.amazonaws.com
    database_password: ""
    database_password_parameter_name: ""

  tasks:
    - name: Install Docker
      ansible.builtin.dnf:
        name: docker
        state: present

    - name: Start and enable Docker
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true

    - name: Add ec2-user to docker group
      ansible.builtin.user:
        name: ec2-user
        groups: docker
        append: true

    - name: Create Docker CLI plugins directory
      ansible.builtin.file:
        path: /usr/local/lib/docker/cli-plugins
        state: directory
        mode: "0755"

    - name: Install Docker Compose plugin
      ansible.builtin.get_url:
        url: https://github.com/docker/compose/releases/download/v2.29.7/docker-compose-linux-x86_64
        dest: /usr/local/lib/docker/cli-plugins/docker-compose
        mode: "0755"

    - name: Create application directory
      ansible.builtin.file:
        path: "{{ app_dir }}"
        state: directory
        owner: ec2-user
        group: ec2-user
        mode: "0755"

    - name: Login to ECR
      ansible.builtin.shell: |
        aws ecr get-login-password --region {{ ecr_region }} | docker login --username AWS --password-stdin {{ ecr_registry }}
      changed_when: false

    - name: Read database password from SSM Parameter Store
      ansible.builtin.command:
        cmd: >
          aws ssm get-parameter
          --name {{ database_password_parameter_name }}
          --with-decryption
          --region {{ aws_region }}
          --query Parameter.Value
          --output text
      register: ssm_database_password
      changed_when: false
      no_log: true
      when: database_password_parameter_name | length > 0

    - name: Set effective database password from SSM
      ansible.builtin.set_fact:
        effective_database_password: "{{ ssm_database_password.stdout }}"
      no_log: true
      when: database_password_parameter_name | length > 0

    - name: Set effective database password from variable
      ansible.builtin.set_fact:
        effective_database_password: "{{ database_password }}"
      no_log: true
      when: database_password_parameter_name | length == 0

    - name: Render production compose file
      ansible.builtin.template:
        src: templates/docker-compose.prod.yml.j2
        dest: "{{ app_dir }}/docker-compose.yml"
        owner: ec2-user
        group: ec2-user
        mode: "0644"

    - name: Pull latest images
      ansible.builtin.command:
        cmd: docker compose pull
        chdir: "{{ app_dir }}"

    - name: Start containers
      ansible.builtin.command:
        cmd: docker compose up -d
        chdir: "{{ app_dir }}"
