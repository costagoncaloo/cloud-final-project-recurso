name: Deploy dev

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Image tag to deploy
        default: latest
        required: true

permissions:
  contents: read
  id-token: write
  packages: read

env:
  AWS_REGION: eu-west-1
  TF_WORKING_DIR: infra/envs/dev

jobs:
  terraform:
    name: Terraform apply
    runs-on: ubuntu-latest
    outputs:
      app_public_ip: ${{ steps.outputs.outputs.app_public_ip }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Terraform validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

      - name: Terraform apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_VAR_ec2_key_name: ${{ secrets.EC2_KEY_NAME }}
          TF_VAR_allowed_ssh_cidr: ${{ secrets.ALLOWED_SSH_CIDR }}
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_image_registry: ghcr.io/${{ github.repository }}
        run: terraform apply -auto-approve

      - name: Terraform outputs
        id: outputs
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          echo "app_public_ip=$(terraform output -raw app_public_ip)" >> "$GITHUB_OUTPUT"

  ansible:
    name: Configure EC2
    runs-on: ubuntu-latest
    needs: terraform
    steps:
      - uses: actions/checkout@v4

      - name: Install Ansible
        run: python -m pip install --user ansible

      - name: Write SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.EC2_PRIVATE_KEY }}" > ~/.ssh/ec2.pem
          chmod 600 ~/.ssh/ec2.pem

      - name: Write inventory
        run: |
          cp ansible/inventory.ini.example ansible/inventory.ini
          sed -i "s/CHANGE_ME_PUBLIC_IP/${{ needs.terraform.outputs.app_public_ip }}/" ansible/inventory.ini
          sed -i "s|~/.ssh/CHANGE_ME.pem|~/.ssh/ec2.pem|" ansible/inventory.ini

      - name: Deploy services
        working-directory: ansible
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
        run: ansible-playbook deploy.yml
