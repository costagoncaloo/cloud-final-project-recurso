name: CD

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: eu-west-1
  AWS_ACCOUNT_ID: "806758135628"
  ECR_REGISTRY: 806758135628.dkr.ecr.eu-west-1.amazonaws.com
  CATALOG_REPOSITORY: cloud-recurso-dev-catalog-service
  ORDER_REPOSITORY: cloud-recurso-dev-order-service
  NOTIFICATION_REPOSITORY: cloud-recurso-dev-notification-service
  DB_USERNAME: app_user

jobs:
  deploy:
    name: Build images and deploy to EC2
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::806758135628:role/cloud-recurso-dev-github-actions-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Read infrastructure outputs
        run: |
          terraform -chdir=infra/envs/dev init -input=false
          echo "APP_HOST=$(terraform -chdir=infra/envs/dev output -raw app_public_ip)" >> "$GITHUB_ENV"
          echo "APP_SECURITY_GROUP_ID=$(terraform -chdir=infra/envs/dev output -raw app_security_group_id)" >> "$GITHUB_ENV"
          echo "DATABASE_ENDPOINT=$(terraform -chdir=infra/envs/dev output -raw database_endpoint)" >> "$GITHUB_ENV"
          echo "DATABASE_NAME=$(terraform -chdir=infra/envs/dev output -raw database_name)" >> "$GITHUB_ENV"
          echo "ORDER_EVENTS_QUEUE_URL=$(terraform -chdir=infra/envs/dev output -raw order_events_queue_url)" >> "$GITHUB_ENV"

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push catalog-service
        uses: docker/build-push-action@v6
        with:
          context: services/catalog-service
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.CATALOG_REPOSITORY }}:${{ github.sha }}
            ${{ env.ECR_REGISTRY }}/${{ env.CATALOG_REPOSITORY }}:latest

      - name: Build and push order-service
        uses: docker/build-push-action@v6
        with:
          context: services/order-service
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.ORDER_REPOSITORY }}:${{ github.sha }}
            ${{ env.ECR_REGISTRY }}/${{ env.ORDER_REPOSITORY }}:latest

      - name: Build and push notification-service
        uses: docker/build-push-action@v6
        with:
          context: services/notification-service
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.NOTIFICATION_REPOSITORY }}:${{ github.sha }}
            ${{ env.ECR_REGISTRY }}/${{ env.NOTIFICATION_REPOSITORY }}:latest

      - name: Install Ansible
        run: |
          python3 -m pip install --user ansible-core
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Prepare SSH inventory
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/cloud-recurso-dev
          chmod 600 ~/.ssh/cloud-recurso-dev
          printf '[app]\n%s ansible_user=ec2-user ansible_ssh_private_key_file=~/.ssh/cloud-recurso-dev\n' "$APP_HOST" > ansible/inventory.ci.ini

      - name: Allow GitHub runner SSH access
        run: |
          RUNNER_IP="$(curl --fail --silent https://checkip.amazonaws.com)"
          echo "RUNNER_IP=${RUNNER_IP}" >> "$GITHUB_ENV"

          aws ec2 authorize-security-group-ingress \
            --group-id "$APP_SECURITY_GROUP_ID" \
            --protocol tcp \
            --port 22 \
            --cidr "${RUNNER_IP}/32" \
            2> authorize-ssh-error.log || {
              if grep -q "InvalidPermission.Duplicate" authorize-ssh-error.log; then
                echo "SSH access for this runner already exists."
              else
                cat authorize-ssh-error.log
                exit 1
              fi
            }

      - name: Trust EC2 SSH host key
        run: |
          mkdir -p ~/.ssh

          for attempt in 1 2 3 4 5; do
            if ssh-keyscan -T 10 -H "$APP_HOST" >> ~/.ssh/known_hosts; then
              exit 0
            fi

            echo "Waiting for SSH host key..."
            sleep 5
          done

          echo "Could not read SSH host key from ${APP_HOST}."
          exit 1

      - name: Deploy with Ansible
        run: |
          ansible-playbook -i ansible/inventory.ci.ini ansible/deploy.yml \
            -e "catalog_image=${ECR_REGISTRY}/${CATALOG_REPOSITORY}:latest" \
            -e "order_image=${ECR_REGISTRY}/${ORDER_REPOSITORY}:latest" \
            -e "notification_image=${ECR_REGISTRY}/${NOTIFICATION_REPOSITORY}:latest" \
            -e "database_endpoint=${DATABASE_ENDPOINT}" \
            -e "database_name=${DATABASE_NAME}" \
            -e "database_username=${DB_USERNAME}" \
            -e "database_password=${{ secrets.DB_PASSWORD }}" \
            -e "order_events_queue_url=${ORDER_EVENTS_QUEUE_URL}"

      - name: Validate deployed health checks
        run: |
          for port in 8081 8082 8083; do
            echo "Waiting for service on port ${port}..."
            curl \
              --fail \
              --silent \
              --show-error \
              --retry 30 \
              --retry-delay 5 \
              --retry-connrefused \
              "http://${APP_HOST}:${port}/actuator/health"
            echo
          done

      - name: Revoke GitHub runner SSH access
        if: always()
        run: |
          if [ -n "${RUNNER_IP:-}" ]; then
            aws ec2 revoke-security-group-ingress \
              --group-id "$APP_SECURITY_GROUP_ID" \
              --protocol tcp \
              --port 22 \
              --cidr "${RUNNER_IP}/32" || true
          fi
