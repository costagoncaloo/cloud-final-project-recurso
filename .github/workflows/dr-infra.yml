name: DR Infrastructure

on:
  pull_request:
    paths:
      - "infra/**"
      - ".github/workflows/dr-infra.yml"
  push:
    branches:
      - main
    paths:
      - "infra/**"
      - ".github/workflows/dr-infra.yml"
  workflow_dispatch:
    inputs:
      apply:
        description: "Apply Terraform changes after planning"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: eu-west-1
  ROLE_TO_ASSUME: arn:aws:iam::806758135628:role/cloud-recurso-dev-github-actions-role
  TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
  TF_VAR_allowed_ssh_cidr: ${{ secrets.ALLOWED_SSH_CIDR }}

jobs:
  plan:
    name: Terraform plan (${{ matrix.environment }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        environment:
          - dev
          - standby

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Prepare SSH public key for Terraform
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/cloud-recurso-dev
          chmod 600 ~/.ssh/cloud-recurso-dev
          ssh-keygen -y -f ~/.ssh/cloud-recurso-dev > ~/.ssh/cloud-recurso-dev.pub
          echo "TF_VAR_ssh_public_key_path=$HOME/.ssh/cloud-recurso-dev.pub" >> "$GITHUB_ENV"

      - name: Terraform init
        run: terraform -chdir=infra/envs/${{ matrix.environment }} init -input=false

      - name: Terraform validate
        run: terraform -chdir=infra/envs/${{ matrix.environment }} validate

      - name: Terraform plan
        run: terraform -chdir=infra/envs/${{ matrix.environment }} plan -input=false

  apply:
    name: Terraform apply (${{ matrix.environment }})
    runs-on: ubuntu-latest
    needs: plan
    environment: aws-production
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.apply == 'true')

    strategy:
      fail-fast: false
      matrix:
        environment:
          - dev
          - standby

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Prepare SSH public key for Terraform
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/cloud-recurso-dev
          chmod 600 ~/.ssh/cloud-recurso-dev
          ssh-keygen -y -f ~/.ssh/cloud-recurso-dev > ~/.ssh/cloud-recurso-dev.pub
          echo "TF_VAR_ssh_public_key_path=$HOME/.ssh/cloud-recurso-dev.pub" >> "$GITHUB_ENV"

      - name: Terraform init
        run: terraform -chdir=infra/envs/${{ matrix.environment }} init -input=false

      - name: Terraform apply
        run: terraform -chdir=infra/envs/${{ matrix.environment }} apply -input=false -auto-approve
