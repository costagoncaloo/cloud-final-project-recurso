<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="980" viewBox="0 0 1500 980" role="img" aria-labelledby="title desc">
  <title id="title">Arquitetura geral do projeto cloud</title>
  <desc id="desc">Diagrama da arquitetura principal com GitHub Actions, ECR, EC2, Docker Compose, RDS PostgreSQL, SQS e DLQ dentro da AWS.</desc>
  <defs>
    <marker id="arrow-blue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#059669"/>
    </marker>
    <marker id="arrow-orange" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#d97706"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 34px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 18px Arial, sans-serif; fill: #475569; }
      .label { font: 700 18px Arial, sans-serif; fill: #0f172a; }
      .small { font: 400 15px Arial, sans-serif; fill: #334155; }
      .tiny { font: 400 13px Arial, sans-serif; fill: #475569; }
      .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 14; }
      .aws { fill: #fff7ed; stroke: #f59e0b; stroke-width: 3; rx: 20; }
      .vpc { fill: #ecfdf5; stroke: #10b981; stroke-width: 3; rx: 18; }
      .subnet-public { fill: #eff6ff; stroke: #60a5fa; stroke-width: 2.5; rx: 16; }
      .subnet-private { fill: #f0fdf4; stroke: #22c55e; stroke-width: 2.5; rx: 16; }
      .service { fill: #ffffff; stroke: #94a3b8; stroke-width: 1.8; rx: 10; }
      .service-blue { fill: #dbeafe; stroke: #3b82f6; stroke-width: 2; rx: 10; }
      .service-green { fill: #dcfce7; stroke: #22c55e; stroke-width: 2; rx: 10; }
      .service-orange { fill: #ffedd5; stroke: #f97316; stroke-width: 2; rx: 10; }
      .line-blue { stroke: #2563eb; stroke-width: 3; fill: none; marker-end: url(#arrow-blue); }
      .line-green { stroke: #059669; stroke-width: 3; fill: none; marker-end: url(#arrow-green); }
      .line-orange { stroke: #d97706; stroke-width: 3; fill: none; marker-end: url(#arrow-orange); }
      .dash { stroke-dasharray: 8 8; }
      .note { fill: #fefce8; stroke: #eab308; stroke-width: 2; rx: 12; }
    </style>
  </defs>

  <rect class="bg" width="1500" height="980"/>
  <text class="title" x="70" y="62">Arquitetura geral do projeto</text>
  <text class="subtitle" x="70" y="94">Microservicos em Docker na AWS, com infraestrutura como codigo, CI/CD, base de dados privada e comunicacao por eventos.</text>

  <rect class="box" x="70" y="140" width="230" height="120"/>
  <text class="label" x="105" y="182">GitHub</text>
  <text class="small" x="105" y="210">Codigo do projeto</text>
  <text class="small" x="105" y="234">Pull requests e commits</text>

  <rect class="box" x="350" y="120" width="280" height="160"/>
  <text class="label" x="385" y="158">GitHub Actions</text>
  <text class="small" x="385" y="188">CI: testes Maven</text>
  <text class="small" x="385" y="214">CD: build das imagens</text>
  <text class="small" x="385" y="240">Ansible deploy na EC2</text>

  <rect class="box" x="690" y="120" width="250" height="160"/>
  <text class="label" x="725" y="158">Amazon ECR</text>
  <text class="small" x="725" y="188">Repositorio privado</text>
  <text class="small" x="725" y="214">catalog-service</text>
  <text class="small" x="725" y="240">order-service</text>
  <text class="small" x="725" y="266">notification-service</text>

  <rect class="box" x="1010" y="120" width="250" height="160"/>
  <text class="label" x="1045" y="158">Terraform</text>
  <text class="small" x="1045" y="188">Cria VPC, EC2, RDS</text>
  <text class="small" x="1045" y="214">SQS, ECR e IAM</text>
  <text class="small" x="1045" y="240">Estado remoto em S3</text>

  <path class="line-blue" d="M300 200 L350 200"/>
  <path class="line-blue" d="M630 200 L690 200"/>
  <path class="line-blue dash" d="M1010 200 L940 200"/>

  <rect class="aws" x="70" y="330" width="1360" height="560"/>
  <text class="label" x="105" y="370">AWS - primary eu-west-1</text>

  <rect class="vpc" x="110" y="400" width="890" height="440"/>
  <text class="label" x="145" y="438">VPC cloud-recurso-dev</text>

  <rect class="subnet-public" x="145" y="470" width="420" height="315"/>
  <text class="label" x="175" y="508">Subnets publicas</text>
  <text class="small" x="175" y="534">Acesso HTTP para demonstracao e SSH controlado no deploy</text>

  <rect class="service-blue" x="185" y="565" width="340" height="180"/>
  <text class="label" x="215" y="600">EC2 App Host</text>
  <text class="small" x="215" y="628">Docker Compose</text>
  <rect class="service" x="215" y="650" width="280" height="34"/>
  <text class="tiny" x="235" y="672">catalog-service : 8081</text>
  <rect class="service" x="215" y="692" width="280" height="34"/>
  <text class="tiny" x="235" y="714">order-service : 8082</text>
  <rect class="service" x="215" y="734" width="280" height="34"/>
  <text class="tiny" x="235" y="756">notification-service : 8083</text>

  <rect class="subnet-private" x="610" y="470" width="350" height="315"/>
  <text class="label" x="640" y="508">Subnets privadas</text>
  <text class="small" x="640" y="534">Sem acesso direto pela Internet</text>
  <rect class="service-green" x="655" y="595" width="260" height="100"/>
  <text class="label" x="685" y="632">RDS PostgreSQL</text>
  <text class="small" x="685" y="660">database: ecommerce</text>
  <text class="small" x="685" y="684">porta 5432 so da EC2</text>

  <rect class="service-orange" x="1060" y="445" width="300" height="120"/>
  <text class="label" x="1095" y="485">SQS order-events</text>
  <text class="small" x="1095" y="515">Fila de eventos</text>
  <text class="small" x="1095" y="540">entre encomendas e notificacoes</text>

  <rect class="service-orange" x="1060" y="625" width="300" height="100"/>
  <text class="label" x="1095" y="664">DLQ</text>
  <text class="small" x="1095" y="694">Mensagens com falhas repetidas</text>

  <rect class="note" x="1060" y="765" width="300" height="75"/>
  <text class="small" x="1090" y="795">Ansible configura Docker, faz</text>
  <text class="small" x="1090" y="820">login no ECR e sobe containers.</text>

  <path class="line-green" d="M525 660 C580 660, 610 660, 655 660"/>
  <text class="tiny" x="540" y="647">JDBC 5432</text>

  <path class="line-orange" d="M495 710 C660 780, 880 520, 1060 505"/>
  <text class="tiny" x="760" y="610">order-service envia evento</text>

  <path class="line-orange" d="M1060 535 C850 560, 690 760, 495 752"/>
  <text class="tiny" x="775" y="720">notification-service consome</text>

  <path class="line-orange" d="M1210 565 L1210 625"/>
  <text class="tiny" x="1224" y="600">falhas</text>

  <path class="line-blue" d="M815 280 C760 370, 520 460, 430 565"/>
  <text class="tiny" x="600" y="385">docker pull</text>

  <path class="line-blue" d="M490 280 C440 360, 375 470, 355 565"/>
  <text class="tiny" x="385" y="385">deploy por SSH/Ansible</text>

  <text class="tiny" x="92" y="930">Resumo: o utilizador entra pela EC2 publica; a base de dados fica privada; os eventos passam pelo SQS; as imagens dos servicos ficam no ECR.</text>
</svg>
